<h1>Welcome to Student Course Portal</h1>

<p>
  Manage your courses and track your enrolments in one place.
</p>

<div class="stats">

  <div>
    <h2>Courses Available</h2>
    <p>{{ courseCount }}</p>
  </div>

  <div>
    <h2>Enrolled</h2>
    <p>3</p>
  </div>

  <div>
    <h2>GPA</h2>
    <p>3.8</p>
  </div>

</div>

<button (click)="addNewCourse()">
  Add New Course
</button>
