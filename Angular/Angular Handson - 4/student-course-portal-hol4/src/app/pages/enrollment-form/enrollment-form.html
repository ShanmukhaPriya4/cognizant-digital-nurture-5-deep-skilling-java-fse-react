<h1>Student Enrollment Request</h1>

<form #enrollForm="ngForm" (ngSubmit)="onSubmit(enrollForm)">

  <!-- Student Name -->
  <div class="form-group">
    <label>Student Name:</label>

    <input
      type="text"
      name="studentName"
      [(ngModel)]="studentName"
      required
      minlength="3"
      #nameCtrl="ngModel"
    >

    <span
      class="error"
      *ngIf="nameCtrl.touched && nameCtrl.errors?.['required']"
    >
      Name is required
    </span>

    <span
      class="error"
      *ngIf="nameCtrl.touched && nameCtrl.errors?.['minlength']"
    >
      Name must be at least 3 characters
    </span>
  </div>


  <!-- Student Email -->
  <div class="form-group">
    <label>Student Email:</label>

    <input
      type="email"
      name="studentEmail"
      [(ngModel)]="studentEmail"
      required
      email
      #emailCtrl="ngModel"
    >

    <span
      class="error"
      *ngIf="emailCtrl.touched && emailCtrl.errors?.['required']"
    >
      Email is required
    </span>

    <span
      class="error"
      *ngIf="emailCtrl.touched && emailCtrl.errors?.['email']"
    >
      Please enter a valid email address
    </span>
  </div>


  <!-- Course ID -->
  <div class="form-group">
    <label>Course ID:</label>

    <input
      type="number"
      name="courseId"
      [(ngModel)]="courseId"
      required
      #courseCtrl="ngModel"
    >

    <span
      class="error"
      *ngIf="courseCtrl.touched && courseCtrl.errors?.['required']"
    >
      Course ID is required
    </span>
  </div>


  <!-- Preferred Semester -->
  <div class="form-group">
    <label>Preferred Semester:</label>

    <select
      name="preferredSemester"
      [(ngModel)]="preferredSemester"
      required
      #semesterCtrl="ngModel"
    >
      <option value="">Select Semester</option>
      <option value="Odd">Odd</option>
      <option value="Even">Even</option>
    </select>

    <span
      class="error"
      *ngIf="semesterCtrl.touched && semesterCtrl.errors?.['required']"
    >
      Please select a semester
    </span>
  </div>


  <!-- Terms -->
  <div class="form-group">
    <label>
      <input
        type="checkbox"
        name="agreeToTerms"
        [(ngModel)]="agreeToTerms"
        required
        #termsCtrl="ngModel"
      >

      I agree to the terms and conditions
    </label>

    <span
      class="error"
      *ngIf="termsCtrl.touched && termsCtrl.errors?.['required']"
    >
      You must agree to the terms
    </span>
  </div>


  <!-- Buttons -->
  <button
    type="submit"
    [disabled]="enrollForm.invalid"
  >
    Submit
  </button>

  <button
    type="button"
    (click)="enrollForm.resetForm()"
  >
    Reset
  </button>


  <!-- Success Message -->
  <div
    class="success"
    *ngIf="submitted"
  >
    Enrollment request submitted successfully!
  </div>

</form>
