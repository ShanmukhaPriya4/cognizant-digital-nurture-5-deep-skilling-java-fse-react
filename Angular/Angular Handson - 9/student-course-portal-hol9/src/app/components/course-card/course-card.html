<div class="course-card">

  <h2>{{ course.name }}</h2>

  <p>Code: {{ course.code }}</p>

  <p>Credits: {{ course.credits }}</p>

  <p>Grade Status: {{ course.gradeStatus }}</p>

  <button
    type="button"
    (click)="toggleEnrollment()"
  >
    {{
      (enrolledIds$ | async)?.includes(course.id)
        ? 'Unenroll'
        : 'Enroll'
    }}
  </button>

</div>
