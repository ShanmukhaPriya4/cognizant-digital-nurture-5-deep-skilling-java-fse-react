<h1>Reactive Student Enrollment Form</h1>

<form
  [formGroup]="enrollForm"
  (ngSubmit)="onSubmit()"
>

  <!-- Student Name -->
  <div>
    <label for="studentName">Student Name:</label>

    <input
      id="studentName"
      type="text"
      formControlName="studentName"
    >
  </div>

  <br>


  <!-- Student Email -->
  <div>
    <label for="studentEmail">Student Email:</label>

    <input
      id="studentEmail"
      type="email"
      formControlName="studentEmail"
    >

    <!-- Async Validator Error -->
    <span
      *ngIf="enrollForm.get('studentEmail')?.errors?.['emailTaken']"
    >
      Email taken
    </span>
  </div>

  <br>


  <!-- Course ID -->
  <div>
    <label for="courseId">Course ID:</label>

    <input
      id="courseId"
      type="text"
      formControlName="courseId"
    >

    <!-- Custom Validator Error -->
    <span
      *ngIf="enrollForm.get('courseId')?.errors?.['noCourseCode']"
    >
      Course code starting with XX is not allowed.
    </span>
  </div>

  <br>


  <!-- Preferred Semester -->
  <div>
    <label for="preferredSemester">Preferred Semester:</label>

    <select
      id="preferredSemester"
      formControlName="preferredSemester"
    >
      <option value="Odd">Odd</option>
      <option value="Even">Even</option>
    </select>
  </div>

  <br>


  <!-- Terms and Conditions -->
  <div>
    <label>
      <input
        type="checkbox"
        formControlName="agreeToTerms"
      >

      I agree to the terms and conditions
    </label>
  </div>

  <br>


  <!-- Additional Courses -->
  <h2>Additional Courses</h2>

  <div
    *ngFor="let ctrl of additionalCourses.controls; let i = index"
  >

    <input
      [formControl]="getCourseControl(i)"
      placeholder="Enter additional course code"
    >

    <button
      type="button"
      (click)="removeCourse(i)"
    >
      Remove
    </button>

    <br><br>

  </div>


  <!-- Add Another Course -->
  <button
    type="button"
    (click)="addCourse()"
  >
    Add Another Course
  </button>

  <br><br>


  <!-- Submit -->
  <button
    type="submit"
    [disabled]="enrollForm.invalid"
  >
    Submit
  </button>

</form>
